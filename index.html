<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Pasqual Bell Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 700px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .next-bell-label {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .next-bell-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            min-width: 90px;
        }

        .countdown-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }

        .countdown-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
        }

        .day-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .day-btn.active {
            background: linear-gradient(90deg, #FFD700, #FFA500);
            color: #1a1a2e;
            border: none;
        }

        .current-day-label {
            color: #00d4ff;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .bell-times {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }

        .bell-times h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .bell-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
            text-align: left;
        }

        .bell-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .bell-item.current {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .bell-item.passed {
            opacity: 0.4;
        }

        .bell-name {
            font-weight: 500;
        }

        .bell-time {
            color: #aaa;
            font-family: monospace;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
        }

        .status.school-day {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .status.not-school-day {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid rgba(255, 165, 0, 0.3);
            color: #ffa500;
        }

        .period-indicator {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            color: #00d4ff;
        }

        @media (max-width: 500px) {
            .countdown-value {
                font-size: 2rem;
            }
            .countdown-item {
                min-width: 70px;
                padding: 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .next-bell-name {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>San Pasqual Bell Countdown</h1>
        <p class="subtitle">Real-time countdown to the next bell</p>

        <div class="day-selector">
            <button class="day-btn active" onclick="setDay('monday')">Monday</button>
            <button class="day-btn" onclick="setDay('tuesday')">Tuesday</button>
            <button class="day-btn" onclick="setDay('wednesday')">Wednesday</button>
            <button class="day-btn" onclick="setDay('thursday')">Thursday</button>
            <button class="day-btn" onclick="setDay('friday')">Friday</button>
            <button class="day-btn" onclick="setDay('minimum')">Min Day</button>
        </div>

        <div class="current-day-label" id="currentDayLabel">Today</div>

        <div class="countdown-box">
            <div class="next-bell-label">Next Bell</div>
            <div class="next-bell-name" id="nextBell">Loading...</div>

            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value" id="hours">--</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="minutes">--</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="seconds">--</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>

            <div class="period-indicator" id="periodIndicator">
                Currently: --
            </div>
        </div>

        <div class="status" id="status">
            Checking schedule...
        </div>

        <div class="bell-times">
            <h3 id="scheduleTitle">Today's Bell Schedule</h3>
            <div class="bell-list" id="bellList">
            </div>
        </div>
    </div>

    <script>
        // San Pasqual High School Bell Schedule
        const BELL_SCHEDULE = {
            monday: [
                { name: "Period 1", time: "8:30 AM", time_end: "9:15 AM" },
                { name: "Period 2", time: "9:25 AM", time_end: "10:07 AM" },
                { name: "Nutrition", time: "10:07 AM", time_end: "10:17 AM" },
                { name: "Period 3", time: "10:27 AM", time_end: "11:09 AM" },
                { name: "Period 4", time: "11:19 AM", time_end: "12:01 PM" },
                { name: "Lunch", time: "12:01 PM", time_end: "12:31 PM" },
                { name: "Period 5", time: "12:41 PM", time_end: "1:23 PM" },
                { name: "Period 6", time: "1:33 PM", time_end: "2:15 PM" },
                { name: "End of Day", time: "3:25 PM" }
            ],

            tuesday: [
                { name: "Period 1", time: "8:30 AM", time_end: "9:25 AM" },
                { name: "Period 2", time: "9:35 AM", time_end: "10:30 AM" },
                { name: "Nutrition", time: "10:30 AM", time_end: "10:40 AM" },
                { name: "Period 3", time: "10:50 AM", time_end: "11:45 AM" },
                { name: "Period 4", time: "11:55 AM", time_end: "12:50 PM" },
                { name: "Lunch", time: "12:50 PM", time_end: "1:20 PM" },
                { name: "Period 5", time: "1:30 PM", time_end: "2:25 PM" },
                { name: "Period 6", time: "2:35 PM", time_end: "3:30 PM" },
                { name: "End of Day", time: "3:30 PM" }
            ],

            wednesday: [
                { name: "Period 2", time: "8:30 AM", time_end: "10:00 AM" },
                { name: "Period 2 Tutorial", time: "10:00 AM", time_end: "10:30 AM" },
                { name: "Nutrition", time: "10:30 AM", time_end: "10:40 AM" },
                { name: "Period 4", time: "10:50 AM", time_end: "12:20 PM" },
                { name: "Period 4 Tutorial", time: "12:20 PM", time_end: "12:50 PM" },
                { name: "Lunch", time: "12:50 PM", time_end: "1:20 PM" },
                { name: "Period 6", time: "1:30 PM", time_end: "3:00 PM" },
                { name: "Period 6 Tutorial", time: "3:00 PM", time_end: "3:30 PM" },
                { name: "End of Day", time: "3:30 PM" }
            ],

            thursday: [
                { name: "Period 1", time: "8:30 AM", time_end: "10:00 AM" },
                { name: "Period 1 Tutorial", time: "10:00 AM", time_end: "10:30 AM" },
                { name: "Nutrition", time: "10:30 AM", time_end: "10:40 AM" },
                { name: "Period 3", time: "10:50 AM", time_end: "12:20 PM" },
                { name: "Period 3 Tutorial", time: "12:20 PM", time_end: "12:50 PM" },
                { name: "Lunch", time: "12:50 PM", time_end: "1:20 PM" },
                { name: "Period 5", time: "1:30 PM", time_end: "3:00 PM" },
                { name: "Period 5 Tutorial", time: "3:00 PM", time_end: "3:30 PM" },
                { name: "End of Day", time: "3:30 PM" }
            ],

            friday: [
                { name: "Period 1", time: "8:30 AM", time_end: "9:25 AM" },
                { name: "Period 2", time: "9:35 AM", time_end: "10:30 AM" },
                { name: "Nutrition", time: "10:30 AM", time_end: "10:40 AM" },
                { name: "Period 3", time: "10:50 AM", time_end: "11:45 AM" },
                { name: "Period 4", time: "11:55 AM", time_end: "12:50 PM" },
                { name: "Lunch", time: "12:50 PM", time_end: "1:20 PM" },
                { name: "Period 5", time: "1:30 PM", time_end: "2:25 PM" },
                { name: "Period 6", time: "2:35 PM", time_end: "3:30 PM" },
                { name: "End of Day", time: "3:30 PM" }
            ],

            minimum: [
                { name: "Period 1", time: "8:30 AM", time_end: "9:05 AM" },
                { name: "Period 2", time: "9:15 AM", time_end: "9:50 AM" },
                { name: "Period 3", time: "10:00 AM", time_end: "10:35 AM" },
                { name: "Nutrition", time: "10:35 AM", time_end: "10:45 AM" },
                { name: "Period 4", time: "10:55 AM", time_end: "11:30 AM" },
                { name: "Period 5", time: "11:40 AM", time_end: "12:15 PM" },
                { name: "Period 6", time: "12:25 PM", time_end: "1:00 PM" },
                { name: "Lunch", time: "1:00 PM", time_end: "1:30 PM" }
            ]
        };

        const DAY_NAMES = {
            monday: "Monday - Early Release",
            tuesday: "Tuesday - Traditional",
            wednesday: "Wednesday - Block",
            thursday: "Thursday - Block",
            friday: "Friday - Traditional",
            minimum: "Minimum Day"
        };

        let selectedDay = null;
        let autoMode = true;

        function parseTime(timeStr) {
            const [time, period] = timeStr.split(' ');
            let [hours, minutes] = time.split(':').map(Number);

            if (period === 'PM' && hours !== 12) {
                hours += 12;
            } else if (period === 'AM' && hours === 12) {
                hours = 0;
            }

            return { hours, minutes };
        }

        function getTodayDay() {
            const day = new Date().getDay();
            const map = { 1: 'monday', 2: 'tuesday', 3: 'wednesday', 4: 'thursday', 5: 'friday', 6: 'friday', 0: 'sunday' };
            return map[day] || 'monday';
        }

        function setDay(day) {
            selectedDay = day;
            autoMode = false;
            document.getElementById('currentDayLabel').textContent = DAY_NAMES[day];
            document.getElementById('scheduleTitle').textContent = DAY_NAMES[day] + ' Schedule';

            // Update buttons
            document.querySelectorAll('.day-btn').forEach((btn, i) => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            updateCountdown();
        }

        function getSchedule() {
            if (autoMode) {
                selectedDay = getTodayDay();
            }

            const day = new Date().getDay();

            // Weekend
            if (day === 0 || day === 6) {
                return { type: 'weekend', bells: [], name: 'Weekend' };
            }

            return { type: 'regular', bells: BELL_SCHEDULE[selectedDay || getTodayDay()], name: DAY_NAMES[selectedDay || getTodayDay()] };
        }

        function getNextBell(bells, now) {
            const currentTime = now.getHours() * 60 + now.getMinutes();

            // First, check if we're currently in a period with an end time
            for (let i = 0; i < bells.length; i++) {
                const { hours, minutes } = parseTime(bells[i].time);
                const bellMinutes = hours * 60 + minutes;

                if (bells[i].time_end) {
                    const { hours: endHours, minutes: endMinutes } = parseTime(bells[i].time_end);
                    const endBellMinutes = endHours * 60 + endMinutes;

                    if (bellMinutes <= currentTime && currentTime < endBellMinutes) {
                        // We're in this period, count to its end time
                        return { bell: { ...bells[i], time: bells[i].time_end }, index: i, isEndTime: true };
                    }
                }
            }

            // Otherwise, find the next bell by start time
            for (let i = 0; i < bells.length; i++) {
                const { hours, minutes } = parseTime(bells[i].time);
                const bellMinutes = hours * 60 + minutes;

                if (bellMinutes > currentTime) {
                    return { bell: bells[i], index: i };
                }
            }

            return { bell: { name: "School Out", time: "Tomorrow" }, index: -1, doneToday: true };
        }

        function getCurrentPeriod(bells, now) {
            const currentTime = now.getHours() * 60 + now.getMinutes();

            for (let i = 0; i < bells.length; i++) {
                const { hours, minutes } = parseTime(bells[i].time);
                const bellMinutes = hours * 60 + minutes;

                // Check if we're within this period (between start and end time)
                if (bells[i].time_end) {
                    const { hours: endHours, minutes: endMinutes } = parseTime(bells[i].time_end);
                    const periodEndMinutes = endHours * 60 + endMinutes;
                    
                    if (bellMinutes <= currentTime && currentTime < periodEndMinutes) {
                        return { current: bells[i], next: bells[i + 1] || null, index: i };
                    }
                } else if (bellMinutes <= currentTime) {
                    // For items without end time, check if next item hasn't started
                    const nextBell = bells[i + 1];
                    if (!nextBell) {
                        return { current: bells[i], next: null, index: i };
                    }
                    const { hours: nh, minutes: nm } = parseTime(nextBell.time);
                    if (nh * 60 + nm > currentTime) {
                        return { current: bells[i], next: nextBell, index: i };
                    }
                }
            }

            return { current: { name: "Before School", time: bells[0].time }, next: bells[0], index: -1 };
        }

        function updateCountdown() {
            const now = new Date();
            const schedule = getSchedule();
            const statusEl = document.getElementById('status');
            const bellListEl = document.getElementById('bellList');
            const dayLabelEl = document.getElementById('currentDayLabel');

            // Update day label if in auto mode
            if (autoMode) {
                const todayDay = getTodayDay();
                dayLabelEl.textContent = 'Today - ' + DAY_NAMES[todayDay];
                document.getElementById('scheduleTitle').textContent = 'Today\'s Bell Schedule';

                // Highlight today button
                document.querySelectorAll('.day-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                const todayIndex = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'minimum'].indexOf(todayDay);
                document.querySelectorAll('.day-btn')[todayIndex >= 0 && todayIndex <= 4 ? todayIndex : 5].classList.add('active');
            }

            // Populate bell list
            bellListEl.innerHTML = schedule.bells.map((bell, i) => {
                const bellTime = parseTime(bell.time);
                const bellMinutes = bellTime.hours * 60 + bellTime.minutes;
                const currentTime = now.getHours() * 60 + now.getMinutes();

                let isCurrent = false;
                let isPassed = false;

                if (autoMode && bell.time_end) {
                    const endTime = parseTime(bell.time_end);
                    const endMinutes = endTime.hours * 60 + endTime.minutes;
                    
                    if (bellMinutes <= currentTime && currentTime < endMinutes) {
                        isCurrent = true;
                    } else if (endMinutes <= currentTime) {
                        isPassed = true;
                    }
                }

                let classes = 'bell-item';
                if (isCurrent) classes += ' current';
                if (isPassed && autoMode) classes += ' passed';

                const timeDisplay = bell.time_end ? bell.time + ' - ' + bell.time_end : bell.time;
                return '<div class="' + classes + '"><span class="bell-name">' + bell.name + '</span><span class="bell-time">' + timeDisplay + '</span></div>';
            }).join('');

            if (schedule.type === 'weekend') {
                statusEl.className = 'status not-school-day';
                statusEl.textContent = 'No school today - Enjoy your weekend!';
                document.getElementById('nextBell').textContent = 'Monday';
                document.getElementById('hours').textContent = '--';
                document.getElementById('minutes').textContent = '--';
                document.getElementById('seconds').textContent = '--';
                document.getElementById('periodIndicator').textContent = 'Have a great weekend!';
                return;
            }

            const nextBellData = getNextBell(schedule.bells, now);
            const periodData = getCurrentPeriod(schedule.bells, now);

            if (nextBellData.doneToday) {
                statusEl.className = 'status not-school-day';
                statusEl.textContent = 'School day complete!';
                const tomorrow = BELL_SCHEDULE[getTodayDay()];
                document.getElementById('nextBell').textContent = 'Tomorrow ' + tomorrow[0].time;
                document.getElementById('hours').textContent = '--';
                document.getElementById('minutes').textContent = '--';
                document.getElementById('seconds').textContent = '--';
                document.getElementById('periodIndicator').textContent = 'Last bell: ' + periodData.current.name + ' at ' + periodData.current.time;
                return;
            }

            statusEl.className = 'status school-day';
            statusEl.textContent = 'School in Session';

            const nextBell = nextBellData.bell;
            document.getElementById('nextBell').textContent = nextBell.name;

            if (periodData.current) {
                document.getElementById('periodIndicator').textContent = 'Currently: ' + periodData.current.name + ' | Next: ' + nextBell.name;
            } else {
                document.getElementById('periodIndicator').textContent = 'Next: ' + nextBell.name;
            }

            // Calculate countdown
            const { hours: targetHours, minutes: targetMinutes } = parseTime(nextBell.time);
            const nowMinutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
            const targetMinutesTotal = targetHours * 60 + targetMinutes;
            const diffMinutes = targetMinutesTotal - nowMinutes;

            const hours = Math.floor(diffMinutes / 60);
            const minutes = Math.floor(diffMinutes % 60);
            const seconds = Math.floor((diffMinutes * 60) % 60);

            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        // Update every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
