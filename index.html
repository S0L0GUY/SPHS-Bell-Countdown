<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Pasqual Bell Countdown</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script defer src="scripts.js"></script>
</head>
<body>
    <div class="container">
        <h1>San Pasqual Bell Countdown</h1>
        <p class="subtitle">Real-time countdown to the next bell</p>

        <div class="day-selector">
            <button class="day-btn active" onclick="setDay('monday', this)">Monday</button>
            <button class="day-btn" onclick="setDay('tuesday', this)">Tuesday</button>
            <button class="day-btn" onclick="setDay('wednesday', this)">Wednesday</button>
            <button class="day-btn" onclick="setDay('thursday', this)">Thursday</button>
            <button class="day-btn" onclick="setDay('friday', this)">Friday</button>
            <button class="day-btn" onclick="setDay('minimum', this)">Min Day</button>
        </div>

        <div class="current-day-label" id="currentDayLabel">Today</div>

        <div class="countdown-box">
            <div class="next-bell-label">Next Bell</div>
            <div class="next-bell-name" id="nextBell">Loading...</div>

            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value" id="hours">--</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="minutes">--</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="seconds">--</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>

            <div class="period-indicator" id="periodIndicator">
                Currently: --
            </div>
        </div>

        <div class="status" id="status">
            Checking schedule...
        </div>

        <div class="bell-times">
            <h3 id="scheduleTitle">Today's Bell Schedule</h3>
            <div class="bell-list" id="bellList">
            </div>
        </div>
    </div>

    <!-- script content moved to scripts.js; js-yaml is loaded above -->
</body>
</html>
